schema_version: 1
uart0:
  framing:
    stx: 0x02
    etx: 0x03
    frame: "[STX][CMD][LEN][DATA][CRC][ETX]"
  len_semantics: "LEN == length(DATA) in bytes"
  endianness: little
  crc:
    name: "CRC-8/ATM"
    poly: 0x07
    init: 0x00
    refin: false
    refout: false
    xorout: 0x00
    covered_bytes: "[CMD][LEN][DATA...]"

commands:
  - {name: PING,             code: 0x01, req_len: 0, resp_len: 1,  resp_notes: "status=0xAA"}
  - {name: POWER_CTRL,       code: 0x02, req_len: 4, resp_len: 1,  req_fields: [{name: mask, type: uint16_le, offset: 0}, {name: value, type: uint16_le, offset: 2}]}
  - {name: SET_BRIGHTNESS,   code: 0x03, req_len: 2, resp_len: 1,  req_fields: [{name: pwm, type: uint16_le, offset: 0}]}
  - {name: GET_STATUS,       code: 0x04, req_len: 0, resp_len: 26}
  - {name: RESET_FAULT,      code: 0x05, req_len: 0, resp_len: 1}
  - {name: RESET_BRIDGE,     code: 0x06, req_len: 0, resp_len: 1}
  - {name: SET_THRESHOLDS,   code: 0x07, req_len: ">=2", resp_len: 1, req_fields: [{name: mask, type: uint16_le, offset: 0}]}
  - {name: BOOTLOADER_ENTER, code: 0x08, req_len: 0, resp_len: 1}
  - {name: CALIBRATE_OFFSET, code: 0x09, req_len: 0, resp_len: 1}
  - {name: NACK,             code: 0xFF, req_len: 1, resp_len: 0,  req_fields: [{name: error_code, type: uint8, offset: 0}]}

get_status:
  data_len: 26
  layout:
    - {field: v24_mv,           type: uint16_le, offset: 0}
    - {field: v12_mv,           type: uint16_le, offset: 2}
    - {field: v5_mv,            type: uint16_le, offset: 4}
    - {field: v3v3_mv,          type: uint16_le, offset: 6}
    - {field: i_lcd_ma,         type: uint16_le, offset: 8}
    - {field: i_bl_ma,          type: uint16_le, offset: 10}
    - {field: i_scaler_ma,      type: uint16_le, offset: 12}
    - {field: i_audio_l_ma,     type: uint16_le, offset: 14}
    - {field: i_audio_r_ma,     type: uint16_le, offset: 16}
    - {field: temp0,            type: int16_le,  offset: 18}
    - {field: temp1,            type: int16_le,  offset: 20}
    - {field: state,            type: uint8,     offset: 22}
    - {field: fault_flags,      type: uint16_le, offset: 23}
    - {field: inputs,           type: uint8,     offset: 25}

domain_bits:
  SCALER: 0
  LCD: 1
  BACKLIGHT: 2
  AUDIO: 3
  ETH1: 4
  ETH2: 5
  TOUCH: 6
